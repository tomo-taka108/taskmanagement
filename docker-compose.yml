services:
  postgres:
    image: postgres:17
    container_name: taskmanagement-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: taskmanagement
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmanagement"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
